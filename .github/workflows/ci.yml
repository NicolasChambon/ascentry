name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/ascentry?schema=public
      STRAVA_CLIENT_ID: '12345'
      STRAVA_CLIENT_SECRET: ci-test-secret
      STRAVA_REDIRECT_URI: http://localhost:3000/api/strava/callback
      STRAVA_TOKEN_ENCRYPTION_KEY: m/uQYmSTigy+YUkJ8nHoS3g+74A/yzUVwShupEIV49s=

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Get pnpm store patch
        run: echo "STORE_PATCH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATCH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ascentry/shared build

      - name: Generate Prisma client
        run: pnpm --filter @ascentry/api exec prisma generate

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r --if-present run build
