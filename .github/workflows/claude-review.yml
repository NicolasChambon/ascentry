name: Claude Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the review in a comment
      issues: write # a PR comment uses issues API
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Surface the SDK output (incl. the real error message) in the logs.
          # Safe here: private repo. Remove once the workflow is stable if desired.
          show_full_output: true
          additional_permissions: |
            actions: read
          prompt: |
            Review pull request #${{ github.event.issue.number }} in ${{ github.repository }},
            following the "Code review" section of CLAUDE.md.
            Read the changes with `gh pr diff ${{ github.event.issue.number }}`.
            For findings tied to specific lines, leave inline comments on those exact lines.
            Then post one overall summary as a PR comment with
            `gh pr comment ${{ github.event.issue.number }} --body "..."`.
          # In agent mode, Claude must have the right to call these tools
          # (gh pr comment = global comment ; create_inline_comment = inline specific comment).
          claude_args: '--allowed-tools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment" --max-turns 30'

      # Make a silent failure loud: the action stays "success" even when the SDK
      # run ends with is_error=true (so a green check could mean "posted nothing").
      - name: Fail if the review errored
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "::error::Claude produced no execution file — it failed to start."
            exit 1
          fi
          result_is_error=$(jq -r 'last(.[] | select(.type == "result")) | .is_error' "$EXECUTION_FILE")
          if [ "$result_is_error" != "false" ]; then
            echo "::error::Claude review ended in an error state (final is_error=$result_is_error). See 'Run Claude review' logs above for the message."
            exit 1
          fi
          echo "Claude review completed cleanly."
