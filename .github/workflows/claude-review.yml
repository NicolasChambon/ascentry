name: Claude Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # poster la review en commentaire
      issues: write # un commentaire de PR passe par l'API issues
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review this pull request following the "Code review" section of CLAUDE.md.
            Post your findings as a single PR comment.
