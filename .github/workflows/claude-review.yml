name: Claude Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the review in a comment
      issues: write # a PR comment uses issues API
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review pull request #${{ github.event.issue.number }} in ${{ github.repository }},
            following the "Code review" section of CLAUDE.md.
            Read the changes with `gh pr diff ${{ github.event.issue.number }}`.
            For findings tied to specific lines, leave inline comments on those exact lines.
            Then post one overall summary as a PR comment with
            `gh pr comment ${{ github.event.issue.number }} --body "..."`.
          # In agent mode, Claude must have the right to call these tools
          # (gh pr comment = global comment ; create_inline_comment = inline specific comment).
          claude_args: '--allowed-tools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment" --max-turns 20'
