services:
  postgres:
    image: postgres:17-alpine
    container_name: ascentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ascentry
      POSTGRES_PASSWORD: ascentry
      POSTGRES_DB: ascentry
    ports:
      - 5432:5432
    volumes:
      - ascentry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ascentry -d ascentry']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ascentry_pgdata:
